version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cosmic-saas-db
    environment:
      POSTGRES_USER: cosmic
      POSTGRES_PASSWORD: cosmic_secret
      POSTGRES_DB: cosmic_saas
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cosmic -d cosmic_saas']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cosmic-saas-api
    environment:
      DATABASE_URL: postgresql://cosmic:cosmic_secret@postgres:5432/cosmic_saas
      JWT_SECRET: change-this-in-production-min-32-chars
      JWT_EXPIRES_IN: 7d
      PORT: 5000
      NODE_ENV: production
    ports:
      - '5000:5000'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cosmic-saas-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
    ports:
      - '3000:3000'
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
